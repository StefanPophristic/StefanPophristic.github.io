---
layout: page
---
<h1>{{ page.title }}</h1>
<p>Posted by {% if page.author %}{{ page.author }}{% else %}{{ site.title }}{% endif %} on {{ page.date | date: "%B %-d, %Y" }}</p>
{{ content }}
{% if page.previous.url %}
  <a href="{{ page.previous.url | prepend: site.baseurl }}">&larr; Previous</a>
{% endif %}
{% if page.next.url %}
  <a href="{{ page.next.url | prepend: site.baseurl }}">Next &rarr;</a>
{% endif %}
