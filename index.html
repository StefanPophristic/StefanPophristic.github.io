---
layout: page
---

<div class="container main-page">
  <div class="row">
    <div class="twelve columns">
      <div id="news-banner" class="news-banner" style="display:none;"></div>
      <div class="main-intro">
        <div class="main-intro-text">
          <p>
            I am currently a fourth year linguistics PhD student at New York University, advised by Alec Marantz. I use behavioral and neuroscientific methods to ask questions about how morphologically complex words are processed in real time.
          </p>
        </div>
        <div class="main-intro-image">
          <img src="{{ site.baseurl }}/assets/images/profile.jpg" alt="Profile photo" class="main-profile-photo u-max-full-width"/>
          <!-- <p> BCS: ˈstefan popˈxristit͡ɕ</p>
          <p> (American) English: ˈstɛfɪn pɑpˈhrɪstɪt͡ʃ</p> -->
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    var newsItems = {{ site.data.news | jsonify }};
    if (!Array.isArray(newsItems) || newsItems.length === 0) return;

    var today = new Date();
    today.setHours(0, 0, 0, 0);

    function parseDate(value) {
      if (!value) return null;
      var d = new Date(value + "T00:00:00");
      return isNaN(d.getTime()) ? null : d;
    }

    var activeItems = newsItems.filter(function (item) {
      var start = parseDate(item.Start_date);
      var end = parseDate(item.End_date);
      if (!start || !end) return false;
      return today >= start && today <= end;
    });

    if (activeItems.length === 0) return;

    activeItems.sort(function (a, b) {
      return parseDate(b.Start_date) - parseDate(a.Start_date);
    });

    var banner = document.getElementById("news-banner");
    if (!banner) return;
    banner.style.display = "none";
    banner.innerHTML = activeItems[0].Comment || "";
    if (banner.textContent.trim() !== "") {
      banner.style.display = "flex";
    }
  })();
</script>
